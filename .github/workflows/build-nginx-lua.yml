name: Build nginx-mod-luajit for aarch64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk git gettext \
          libssl-dev xsltproc wget unzip python3 zstd
          
    - name: Download ImmortalWrt SDK
      run: |
        wget https://downloads.immortalwrt.org/snapshots/targets/qualcommax/ipq60xx/immortalwrt-sdk-qualcommax-ipq60xx_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        zstd -d immortalwrt-sdk-*.tar.zst
        tar xf immortalwrt-sdk-*.tar
        SDK_DIR=$(ls -d immortalwrt-sdk-* | head -1)
        mv "$SDK_DIR" sdk
        ls -la sdk/
        
    - name: Update feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Configure build
      run: |
        cd sdk
        make defconfig
        # 启用nginx和lua模块
        echo "CONFIG_PACKAGE_nginx=m" >> .config
        echo "CONFIG_PACKAGE_nginx-ssl=m" >> .config
        echo "CONFIG_NGINX_HTTP_LUA=y" >> .config
        make defconfig
        
    - name: Build nginx with lua
      run: |
        cd sdk
        make package/nginx/compile -j$(nproc) V=s
        
    - name: Collect packages
      run: |
        mkdir -p artifacts
        find sdk/bin/packages -name 'nginx*.ipk' -exec cp {} artifacts/ \;
        find sdk/bin/packages -name 'lua*.ipk' -exec cp {} artifacts/ \;
        ls -lh artifacts/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nginx-lua-modules
        path: artifacts/*.ipk
