name: Build nginx-mod-luajit for aarch64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk git gettext \
          libssl-dev xsltproc wget unzip python3 zstd
          
    - name: Download ImmortalWrt SDK
      run: |
        wget https://downloads.immortalwrt.org/snapshots/targets/qualcommax/ipq60xx/immortalwrt-sdk-qualcommax-ipq60xx_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        zstd -d immortalwrt-sdk-*.tar.zst
        tar xf immortalwrt-sdk-*.tar
        SDK_DIR=$(ls -d immortalwrt-sdk-* | head -1)
        mv "$SDK_DIR" sdk
        ls -la sdk/
        
    - name: Update feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Configure build
      run: |
        cd sdk
        make defconfig
        
        # 查看可用的nginx包
        echo "Available nginx packages:"
        ./scripts/feeds search nginx
        
        # 安装nginx-ssl包
        ./scripts/feeds install nginx-ssl
        
        # 配置启用nginx-ssl
        cat >> .config << EOF
        CONFIG_PACKAGE_nginx-ssl=m
        CONFIG_PACKAGE_nginx-ssl-util=m
        EOF
        
        make defconfig
        echo "Final config:"
        grep -i nginx .config || echo "No nginx in config"
        
    - name: Build nginx
      run: |
        cd sdk
        make package/feeds/packages/nginx-ssl/compile -j$(nproc) V=s || \
        make package/nginx-ssl/compile -j$(nproc) V=s || \
        make package/nginx/compile -j$(nproc) V=s
        
    - name: Collect packages
      run: |
        mkdir -p artifacts
        echo "Searching for ipk files..."
        find sdk/bin -name '*.ipk' -type f
        echo ""
        echo "Copying nginx and lua packages..."
        find sdk/bin -name 'nginx*.ipk' -type f -exec cp {} artifacts/ \; || true
        find sdk/bin -name '*lua*.ipk' -type f -exec cp {} artifacts/ \; || true
        echo ""
        echo "Artifacts collected:"
        ls -lh artifacts/ || echo "No artifacts found"
        
        # 如果没有文件，创建一个说明文件
        if [ -z "$(ls -A artifacts/)" ]; then
          echo "No ipk files were generated. Check build logs above." > artifacts/README.txt
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: nginx-lua-modules
        path: artifacts/
        if-no-files-found: warn
