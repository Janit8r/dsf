name: Build nginx-mod-luajit for aarch64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk git gettext \
          libssl-dev xsltproc wget unzip python3
          
    - name: Download ImmortalWrt SDK
      run: |
        wget https://downloads.immortalwrt.org/releases/24.10-SNAPSHOT/targets/ipq60xx/generic/immortalwrt-sdk-24.10-SNAPSHOT-ipq60xx-generic_gcc-14.2.0_musl.Linux-x86_64.tar.xz
        tar xf immortalwrt-sdk-*.tar.xz
        mv immortalwrt-sdk-* sdk
        
    - name: Update feeds
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Build nginx-mod-luajit
      run: |
        cd sdk
        make defconfig
        make package/nginx-mod-luajit/compile -j$(nproc) V=s
        
    - name: Collect packages
      run: |
        mkdir -p artifacts
        find sdk/bin/packages -name 'nginx-mod-luajit*.ipk' -exec cp {} artifacts/ \;
        find sdk/bin/packages -name 'liblua*' -exec cp {} artifacts/ \;
        ls -lh artifacts/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nginx-lua-modules
        path: artifacts/*.ipk
