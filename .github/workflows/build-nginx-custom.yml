name: Build nginx-lua (Custom Docker)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-distutils rsync unzip zlib1g-dev file wget zstd qemu-user-static
          
    - name: Download SDK
      run: |
        wget https://downloads.immortalwrt.org/snapshots/targets/qualcommax/ipq60xx/immortalwrt-sdk-qualcommax-ipq60xx_gcc-14.3.0_musl.Linux-x86_64.tar.zst
        zstd -d immortalwrt-sdk-*.tar.zst
        tar xf immortalwrt-sdk-*.tar
        SDK_DIR=$(ls -d immortalwrt-sdk-* | head -1)
        mv "$SDK_DIR" sdk
        
    - name: Update feeds and install packages
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 列出可用的nginx包
        echo "=== Available nginx packages ==="
        ./scripts/feeds search nginx
        
        # 安装nginx-ssl
        ./scripts/feeds install nginx-ssl
        
    - name: Configure build
      run: |
        cd sdk
        
        # 创建配置
        cat > .config << EOF
        CONFIG_TARGET_qualcommax=y
        CONFIG_TARGET_qualcommax_ipq60xx=y
        CONFIG_PACKAGE_nginx-ssl=m
        CONFIG_NGINX_HTTP_LUA=y
        CONFIG_PACKAGE_lua=m
        CONFIG_PACKAGE_luajit=m
        EOF
        
        make defconfig
        
        echo "=== Final config (nginx related) ==="
        grep -i nginx .config || echo "No nginx config found"
        
    - name: Download dependencies
      run: |
        cd sdk
        make download -j8
        
    - name: Build toolchain
      run: |
        cd sdk
        make toolchain/install -j$(nproc)
        
    - name: Build nginx-ssl
      run: |
        cd sdk
        make package/feeds/packages/nginx-ssl/compile -j$(nproc) V=s || \
        make package/nginx-ssl/compile -j$(nproc) V=s || \
        make package/nginx/compile -j$(nproc) V=s
        
    - name: Collect packages
      run: |
        mkdir -p artifacts
        echo "=== All ipk files ==="
        find sdk/bin -name '*.ipk' -type f
        
        echo ""
        echo "=== Copying packages ==="
        find sdk/bin -name '*.ipk' -type f -exec cp -v {} artifacts/ \;
        
        echo ""
        echo "=== Artifacts ==="
        ls -lh artifacts/
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: nginx-lua-modules
        path: artifacts/
        if-no-files-found: warn
