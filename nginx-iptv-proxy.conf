server {
    listen 8080;
    
    resolver 8.8.8.8;
    
    # m3u8入口：自动改写内容
    location ~ ^/iptv/(.+\.m3u8)$ {
        set $m3u8_path $1;
        content_by_lua_block {
            local http = require "resty.http"
            local httpc = http.new()
            
            -- 从path提取原始URL
            local path = ngx.var.m3u8_path
            local url = "http://" .. path
            
            -- 下载原始m3u8
            local res, err = httpc:request_uri(url, {
                method = "GET",
                headers = {
                    ["User-Agent"] = "VLC/3.0"
                }
            })
            
            if not res then
                ngx.status = 500
                ngx.say("Error: " .. err)
                return
            end
            
            -- 替换所有116.199链接
            local body = res.body
            body = string.gsub(body, "http://116%.199%.", "http://192.168.1.3:8080/proxy/116.199.")
            
            ngx.header["Content-Type"] = "application/vnd.apple.mpegurl"
            ngx.say(body)
        }
    }
    
    # TS文件直接代理
    location ~ ^/proxy/(.+):(\d+)/(.*)$ {
        set $target_host $1;
        set $target_port $2;
        set $target_path $3;
        
        proxy_pass http://$target_host:$target_port/$target_path$is_args$args;
        proxy_buffering off;
        proxy_set_header Host $target_host:$target_port;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }
}
